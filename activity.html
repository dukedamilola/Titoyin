<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Activity Log — Titoyin Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-logo">
      <img src="../assets/titoyin-logo.png" alt="Titoyin" onerror="this.style.display='none'">
      <div><div class="sidebar-logo-text">Titoyin's Blog</div><div class="sidebar-logo-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="new-post.html"  class="nav-item"><span class="nav-icon">✏️</span> New Post</a>
      <a href="posts.html"     class="nav-item"><span class="nav-icon">📰</span> All Posts</a>
      <div class="nav-section-label">Content</div>
      <a href="editorial.html" class="nav-item"><span class="nav-icon">⭐</span> Editorial Control</a>
      <a href="ads.html"       class="nav-item"><span class="nav-icon">📢</span> Advertisements</a>
      <a href="media.html"     class="nav-item"><span class="nav-icon">🖼️</span> Media Library</a>
      <div class="nav-section-label">Site</div>
      <a href="metrics.html"   class="nav-item"><span class="nav-icon">📈</span> Metrics</a>
      <a href="settings.html"  class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
      <a href="activity.html"  class="nav-item active"><span class="nav-icon">📋</span> Activity Log</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank" class="nav-item"><span class="nav-icon">🌐</span> View Site</a>
      <a href="#" class="nav-item" onclick="adminLogout()"><span class="nav-icon">🚪</span> Log Out</a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="admin-topbar">
    <button class="topbar-menu-btn" id="topbar-menu-btn">☰</button>
    <span class="topbar-title">Activity Log</span>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm" onclick="clearLog()">Clear Log</button>
    </div>
  </div>
  <main class="admin-main">
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">Admin Activity Log</div>
        <div class="card-subtitle">All actions taken in the admin panel — last 100 entries</div></div>
      </div>
      <div id="log-list"></div>
    </div>
  </main>
</div>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script>
const typeIcons = { login:'🔑', publish:'🚀', draft:'💾', delete:'🗑️', ad:'📢', settings:'⚙️', editorial:'⭐', breaking:'🔴', status:'🔄' };
function renderLog() {
  const logs = getActivityLog();
  const el   = document.getElementById('log-list');
  if (!logs.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px;color:var(--ink-muted);">No activity recorded yet</div>';
    return;
  }
  el.innerHTML = logs.map(l => `
    <div class="activity-item">
      <div style="font-size:18px;flex-shrink:0;">${typeIcons[l.type]||'📋'}</div>
      <div class="activity-text">${l.description}</div>
      <div class="activity-time">${l.display||''}</div>
    </div>
  `).join('');
}
function clearLog() {
  if (confirm('Clear the activity log? This cannot be undone.')) {
    localStorage.removeItem('titoyin_activity');
    renderLog();
    showToast('Activity log cleared', 'info');
  }
}
renderLog();
</script>
</body>
</html>
